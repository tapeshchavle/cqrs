spring.application.name=cqrs

# Datasource — H2 (dev) / swap to Postgres for production
spring.datasource.url=jdbc:h2:mem:cqrs_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console
spring.h2-console.enabled=true
spring.h2-console.path=/h2-console

# Actuator
management.endpoints.web.exposure.include=health,metrics,info

# Async Thread Pool
cqrs.async.core-pool-size=4
cqrs.async.max-pool-size=8
cqrs.async.queue-capacity=100

# Logging
logging.level.com.cqrs=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n
